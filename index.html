<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIROS | Sistema Logístico</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.css" />
</head>
<body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.js"></script>
    <script>
      stlite.mount({
        // Deixamos vazio para o sistema carregar o básico instantaneamente
        requirements: [], 
        entrypoint: "main.py",
        files: {
          "main.py": `
import streamlit as st

st.set_page_config(page_title="KAIROS Logística", layout="wide")

st.title("📦 KAIROS | Sistema BW")

st.sidebar.success("Ambiente Conectado")

aba = st.sidebar.radio("Navegação", ["Início", "Status do Banco"])

if aba == "Início":
    st.balloons()
    st.header("🚀 Sistema Online!")
    st.write("Se você está vendo esta tela, conseguimos vencer o erro de carregamento.")
    st.info("O próximo passo agora é reintroduzir as funções do Supabase uma a uma.")

elif aba == "Status do Banco":
    st.subheader("Conexão Supabase")
    st.warning("Aguardando configuração da API REST.")
`
        },
      }, document.getElementById("root"));
    </script>
</body>
</html>
