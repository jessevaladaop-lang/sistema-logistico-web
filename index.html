import streamlit as st
from database import salvar_registro, carregar_dados
from datetime import datetime

def exibir_atendimento():
    st.header("🚛 Atendimento de Motoristas")
    
    with st.form("form_atendimento"):
        col1, col2 = st.columns(2)
        cliente = col1.text_input("Cliente")
        transp = col1.text_input("Transportadora")
        publico = col2.selectbox("Público", ["Interno", "Externo"])
        chegada = col2.text_input("Horário Chegada (HH:MM)")
        
        if st.form_submit_button("Registrar Entrada"):
            dados = {
                "cliente": cliente, 
                "transp": transp, 
                "publico": publico, 
                "chegada": chegada,
                "data_referencia": datetime.now().strftime("%d/%m/%Y")
            }
            salvar_registro("registros", dados)
            st.success("Motorista registrado!")

    st.subheader("Histórico de Hoje")
    df = carregar_dados("registros")
    if not df.empty:
        st.dataframe(df, use_container_width=True)
`,

          "pedidos.py": `
import streamlit as st
from database import carregar_dados, salvar_registro

def exibir_pedidos():
    st.header("📝 Gestão de Pedidos")
    with st.expander("Cadastrar Novo Pedido"):
        with st.form("novo_pedido"):
            p_num = st.text_input("Número do Pedido")
            p_cli = st.text_input("Cliente")
            if st.form_submit_button("Salvar"):
                salvar_registro("controle_pedidos", {"pedido": p_num, "cliente": p_cli})
                st.success("Pedido Salvo!")
                st.rerun()
    
    df = carregar_dados("controle_pedidos")
    if not df.empty:
        st.dataframe(df, use_container_width=True)
`,

          "main.py": `
import streamlit as st
from atendimento import exibir_atendimento
from pedidos import exibir_pedidos

st.set_page_config(page_title="KAIROS | Logística", layout="wide")

aba = st.sidebar.radio("Navegação", ["Dashboard", "Atendimento", "Pedidos"])

if aba == "Dashboard":
    st.title("📊 Indicadores Operacionais")
    col1, col2, col3 = st.columns(3)
    col1.metric("Status", "Online")
    col2.metric("Banco", "Conectado")
    col3.metric("Versão", "2.0 (HTML)")
    
elif aba == "Atendimento":
    exibir_atendimento()
else:
    exibir_pedidos()
