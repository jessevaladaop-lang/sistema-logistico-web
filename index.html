def conectar_db():
    return create_client(URL, KEY)

def get_opcoes(categoria, padrao):
    supabase = conectar_db()
    try:
        response = supabase.table("opcoes_custom").select("valor").eq("categoria", categoria).execute()
        customs = [row['valor'] for row in response.data]
        return padrao + customs + ["+ ADICIONAR NOVO"]
    except:
        return padrao + ["+ ADICIONAR NOVO"]

def salvar_nova_opcao(categoria, valor):
    if valor and valor != "+ ADICIONAR NOVO":
        supabase = conectar_db()
        supabase.table("opcoes_custom").insert({"categoria": categoria, "valor": valor}).execute()

# Função para buscar todos os pedidos (Antigo pd.read_sql)
def carregar_pedidos():
    supabase = conectar_db()
    response = supabase.table("controle_pedidos").select("*").execute()
    return pd.DataFrame(response.data)

# Função para salvar pedidos
def salvar_pedido(dados_dict):
    supabase = conectar_db()
    supabase.table("controle_pedidos").insert(dados_dict).execute()
