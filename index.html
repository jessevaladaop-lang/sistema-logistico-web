    "Content-Type": "application/json",
    "Prefer": "return=representation"
}

def query_supabase(metodo, endpoint, dados=None, params=None):
    url = f"{URL_BASE}/{endpoint}"
    try:
        if metodo == "GET":
            res = requests.get(url, headers=HEADERS, params=params)
            return res.json()
        elif metodo == "POST":
            return requests.post(url, headers=HEADERS, data=json.dumps(dados))
        elif metodo == "PATCH":
            return requests.patch(url, headers=HEADERS, data=json.dumps(dados), params=params)
        elif metodo == "DELETE":
            return requests.delete(url, headers=HEADERS, params=params)
    except Exception as e:
        st.error(f"Erro na conexão: {e}")
        return []

          // --- 2. GESTÃO DE MENUS ---
          "menus.py": `
import streamlit as st
from database import query_supabase

def gerenciar_menu_visual(categoria, lista_padrao):
    dados = query_supabase("GET", "opcoes_custom", params={"categoria": f"eq.{categoria}"})
    if not dados:
        for p in lista_padrao:
            query_supabase("POST", "opcoes_custom", dados={"categoria": categoria, "valor": p})
        dados = query_supabase("GET", "opcoes_custom", params={"categoria": f"eq.{categoria}"})
    
    opcoes = [item['valor'] for item in dados]
    
    st.markdown(f"**⚙️ {categoria.upper()}**")
    col1, col2 = st.columns([3, 1])
    novo = col1.text_input(f"Adicionar em {categoria}", key=f"in_{categoria}")
    if col2.button("➕", key=f"bt_{categoria}"):
        if novo and novo not in opcoes:
            query_supabase("POST", "opcoes_custom", dados={"categoria": categoria, "valor": novo})
            st.rerun()
    
    remover = st.selectbox("Excluir opção", ["---"] + opcoes, key=f"del_sel_{categoria}")
    if st.button(f"🗑️ Remover de {categoria}", key=f"bt_del_{categoria}"):
        if remover != "---":
            query_supabase("DELETE", "opcoes_custom", params={"categoria": f"eq.{categoria}", "valor": f"eq.{remover}"})
            st.rerun()
    return opcoes
`,

          // --- 3. MÓDULO DE PEDIDOS (A-Q) ---
          "pedidos.py": `
import streamlit as st
import pandas as pd
from datetime import date
from database import query_supabase
from menus import gerenciar_menu_visual

def exibir_pedidos():
    st.title("📋 GESTÃO DE PEDIDOS (A-Q)")

    with st.expander("🛠️ CONFIGURAR LISTAS DO SISTEMA"):
        c_status = gerenciar_menu_visual("status", ["GAS", "CONF", "IMPR", "CANC"])
        st.divider()
        c_baixado = gerenciar_menu_visual("baixado_por", ["IZA", "BEA", "GAB"])
        st.divider()
        c_separador = gerenciar_menu_visual("separador", ["EDUARDO", "LUCAS", "JONATHAN"])

    with st.expander("➕ LANÇAR NOVO PEDIDO", expanded=True):
        with st.form("form_pedidos_completo"):
            st.markdown("### 🔹 Cadastro (A-D)")
            col1, col2, col3, col4 = st.columns(4)
            p_st = col1.selectbox("Status", [""] + c_status)
            p_bx = col2.selectbox("Baixado", [""] + c_baixado)
            p_num = col3.text_input("Nº Pedido")
            p_dt = col4.date_input("Data", value=date.today())

            st.markdown("### 🔹 Logística e Cliente (E-K)")
            col5, col6, col7 = st.columns(3)
            p_cli = col5.text_input("Cliente")
            p_tr = col6.text_input("Transportadora")
            p_nf = col7.text_input("Nº Nota Fiscal")

            st.markdown("### 🔹 Separação e Conferência (L-Q)")
            col8, col9, col10 = st.columns(3)
            p_sep = col8.selectbox("Separador", [""] + c_separador)
            p_conf = col9.text_input("Conferente")
            p_exp = col10.text_input("Expedição")

            if st.form_submit_button("💾 SALVAR REGISTRO"):
                if p_num and p_cli:
                    dados = {
                        "status": p_st, "baixado_por": p_bx, "pedido": p_num,
                        "data": p_dt.strftime("%d/%m/%Y"), "cliente": p_cli,
                        "transportadora": p_tr, "n_nf": p_nf, "separador": p_sep
                    }
                    query_supabase("POST", "controle_pedidos", dados=dados)
                    st.success("Pedido registrado!")
                    st.rerun()

    st.subheader("📊 Visualização de Dados")
    dados_nuvem = query_supabase("GET", "controle_pedidos", params={"order": "id.desc"})
    if dados_nuvem:
        df = pd.DataFrame(dados_nuvem)
        st.data_editor(df, use_container_width=True)
`,

          // --- 4. MÓDULO DE ATENDIMENTO (MOTORISTAS) ---
          "atendimento.py": `
import streamlit as st
import pandas as pd
from database import query_supabase
from datetime import datetime

def exibir_atendimento():
    st.title("🚛 ATENDIMENTO LOGÍSTICO")
    
    with st.form("atendimento_motorista"):
        col1, col2 = st.columns(2)
        m_cliente = col1.text_input("Cliente/Destino")
        m_transp = col1.text_input("Transportadora")
        m_chegada = col2.text_input("Horário Chegada (HH:MM)")
        m_status = col2.selectbox("Situação", ["Aguardando", "Em Carga", "Liberado"])
        
        if st.form_submit_button("Registrar Movimentação"):
            dados = {
                "cliente": m_cliente,
                "transp": m_transp,
                "chegada": m_chegada,
                "status": m_status,
                "data_referencia": datetime.now().strftime("%d/%m/%Y")
            }
            query_supabase("POST", "registros", dados=dados)
            st.success("Registro de motorista salvo!")
            st.rerun()

    st.subheader("📋 Movimentação do Dia")
    registros = query_supabase("GET", "registros", params={"order": "id.desc"})
    if registros:
        st.table(pd.DataFrame(registros))
`,

          // --- 5. ARQUIVO PRINCIPAL (ROTEADOR) ---
          "main.py": `

from pedidos import exibir_pedidos
from atendimento import exibir_atendimento

if opcao == "📊 Dashboard":
    st.title("Painel de Controle")
    st.write("Bem-vindo ao sistema modular.")
elif opcao == "📝 Gestão de Pedidos":
    exibir_pedidos()
elif opcao == "🚛 Atendimento":
    exibir_atendimento()
`
        },
