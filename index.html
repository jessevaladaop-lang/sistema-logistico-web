<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIROS | Teste de Sistema</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.css" />
</head>
<body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.js"></script>
    <script>
      stlite.mount({
        // Removemos o supabase e openai temporariamente para limpar o erro
        requirements: ["pandas"], 
        entrypoint: "main.py",
        files: {
          "main.py": `
import streamlit as st
import pandas as pd

st.title("📦 KAIROS | Teste de Diagnóstico")
st.success("O ambiente Stlite carregou com sucesso!")

st.info("Se você está vendo esta mensagem, o erro anterior era causado pela biblioteca do Supabase.")

st.subheader("Próximo Passo:")
st.write("Agora que sabemos que o ambiente funciona, vou ajustar a forma como conectamos ao banco de dados sem usar a biblioteca problemática.")
`
        },
      }, document.getElementById("root"));
    </script>
</body>
</html>
