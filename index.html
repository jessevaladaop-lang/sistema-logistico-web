<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIROS | Logística Operacional</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.css" />
    <style>
        body { background-color: #0f172a; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["pandas", "requests", "openai", "supabase-py"],
        entrypoint: "main.py",
        files: {
          "database.py": `
import streamlit as st
import pandas as pd
from supabase import create_client, Client

URL = "https://lnnidnxaxcpuutyyxowd.supabase.co"
KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxubmlkbnhheGNwdXV0eXl4b3dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzQ4MjIsImV4cCI6MjA4ODg1MDgyMn0.ysE7PQ6Ce_MtfWPtUWeUVmfNAkjKiFJqrK6kAyicB4g"

def conectar_db():
    return create_client(URL, KEY)

def get_opcoes(categoria, padrao):
    supabase = conectar_db()
    try:
        response = supabase.table("opcoes_custom").select("valor").eq("categoria", categoria).execute()
        customs = [row['valor'] for row in response.data]
        return padrao + customs + ["+ ADICIONAR NOVO"]
    except:
        return padrao + ["+ ADICIONAR NOVO"]

def carregar_pedidos():
    supabase = conectar_db()
    try:
        response = supabase.table("controle_pedidos").select("*").execute()
        return pd.DataFrame(response.data)
    except:
        return pd.DataFrame()

def salvar_pedido(dados_dict):
    supabase = conectar_db()
    return supabase.table("controle_pedidos").insert(dados_dict).execute()
`,

          "pedidos.py": `
import streamlit as st
import pandas as pd
from database import carregar_pedidos, salvar_pedido

def exibir_pedidos():
    st.header("📝 Gestão de Pedidos")
    
    with st.expander("Cadastrar Novo Pedido"):
        with st.form("novo_pedido"):
            p_num = st.text_input("Número do Pedido")
            p_cli = st.text_input("Cliente")
            p_transp = st.text_input("Transportadora")
            if st.form_submit_button("Salvar"):
                salvar_pedido({"pedido": p_num, "cliente": p_cli, "transportadora": p_transp})
                st.success("Pedido salvo!")
                st.rerun()

    df = carregar_pedidos()
    if not df.empty:
        st.dataframe(df, use_container_width=True)
    else:
        st.info("Nenhum pedido encontrado ou erro na tabela.")
`,

          "main.py": `
import streamlit as st
from pedidos import exibir_pedidos

st.set_page_config(page_title="Painel Logístico", layout="wide")

st.sidebar.title("KAIROS 📦")
aba = st.sidebar.radio("Navegação", ["Dashboard", "Pedidos"])

if aba == "Dashboard":
    st.title("📊 Painel Geral")
    st.success("Conectado ao Supabase!")
else:
    exibir_pedidos()
`
        },
      }, document.getElementById("root"));
    </script>
</body>
</html>
