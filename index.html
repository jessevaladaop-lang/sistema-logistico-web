<body>

    <script>
      stlite.mount({
        requirements: ["pandas", "requests"],
        entrypoint: "main.py",
        files: {
          "database.py": `

    "Content-Type": "application/json",
    "Prefer": "return=representation"
}

def carregar_pedidos():
    try:
        response = requests.get(f"{URL_BASE}/controle_pedidos?select=*", headers=HEADERS)
        return pd.DataFrame(response.json())
    except:
        return pd.DataFrame()

def salvar_pedido(dados):
    return requests.post(f"{URL_BASE}/controle_pedidos", headers=HEADERS, json=dados)

def get_opcoes(categoria):
    try:
        response = requests.get(f"{URL_BASE}/opcoes_custom?categoria=eq.{categoria}&select=valor", headers=HEADERS)
        return [item['valor'] for item in response.json()]
    except:
        return []
`,

          "pedidos.py": `
import streamlit as st
from database import carregar_pedidos, salvar_pedido

def exibir_pedidos():
    st.header("📝 Gestão de Pedidos")
    
    with st.form("novo_pedido"):
        col1, col2 = st.columns(2)
        p_num = col1.text_input("Número do Pedido")
        p_cli = col1.text_input("Cliente")
        p_transp = col2.text_input("Transportadora")
        if st.form_submit_button("Salvar Pedido"):
            if p_num and p_cli:
                salvar_pedido({"pedido": p_num, "cliente": p_cli, "transportadora": p_transp})
                st.success("Salvo com sucesso!")
                st.rerun()

    st.subheader("Pedidos Recentes")
    df = carregar_pedidos()
    if not df.empty:
        st.dataframe(df, use_container_width=True)
`,

          "main.py": `
import streamlit as st
from pedidos import exibir_pedidos

if aba == "Dashboard":
    st.title("📊 Painel Geral")
    st.success("Conectado via API REST (Modo Leve)")
    st.info("Este modo garante 100% de compatibilidade com o navegador.")
else:
    exibir_pedidos()
`
